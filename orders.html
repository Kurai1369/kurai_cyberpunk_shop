<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStore | Заказы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- SIDEBAR -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar">
            <!-- Заголовок меню -->
            <div class="sidebar-header">
                <i class="bi bi-grid-3x3-gap"></i>
                <span class="cyber-title fs-5">Меню</span>
            </div>

            <!-- Навигация -->
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="main.html"><i class="bi bi-house-door"></i>Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="categories.html"><i class="bi bi-tags"></i>Категории</a></li>
                <li class="nav-item"><a class="nav-link" href="orders.html"><i class="bi bi-cart3"></i>Заказы</a></li>
                <li class="nav-item"><a class="nav-link" href="contacts.html"><i class="bi bi-envelope"></i>Контакты</a></li>
            </ul>

            <!-- Профиль (в самом низу сайдбара) -->
            <div class="user-section">
                <button class="btn user-btn">
                    <img src="https://placehold.co/40/111/b026ff?text=U" class="rounded-circle" alt="Avatar">
                    Пользователь
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Профиль</a></li>
                    <li><a class="dropdown-item" href="#">Выйти</a></li>
                </ul>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 text-center">
            <h1 class="mb-4 cyber-title">Заказы</h1>
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="cyber-card text-start">
                        <table class="table table-dark table-borderless mb-3">
                            <thead class="border-bottom border-secondary">
                                <tr>
                                    <th>Товар</th>
                                    <th class="text-center">Кол-во</th>
                                    <th class="text-end">Стоимость</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>Cyber Deck v4</td><td class="text-center">1</td><td class="text-end text-glow-green fw-bold">100$</td></tr>
                                <tr><td>Neural Link</td><td class="text-center">2</td><td class="text-end text-glow-green fw-bold">200$</td></tr>
                            </tbody>
                        </table>
                        <div class="d-flex justify-content-between align-items-center mb-3 px-2">
                            <span class="fs-5">Итого:</span>
                            <span class="fs-4 fw-bold text-glow-yellow">300$</span>
                        </div>
                        <button class="cyber-btn w-100 py-2">Купить!</button>
                    </div>
                    <div class="d-flex justify-content-between mt-4 px-3">
                        <a href="#" class="hover-glow">Смотрели ранее...</a>
                        <a href="#" class="hover-glow">Прошлые заказы</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
